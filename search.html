];

const $ = id => document.getElementById(id);
$('totalCount').textContent = INDEX.length;

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function search(q) {
  q = q.trim();
  const results = $('results');
  if (!q) {
    results.innerHTML = '';
    $('clearBtn').classList.remove('visible');
    return;
  }
  $('clearBtn').classList.add('visible');
  const lower = q.toLowerCase();
  const matched = INDEX.map(item => {
    const haystack = (item.title + ' ' + item.kw + ' ' + item.cat).toLowerCase();
    let score = 0;
    if (item.title.toLowerCase().includes(lower)) score += 10;
    if (item.kw.toLowerCase().includes(lower)) score += 5;
    if (item.cat.toLowerCase().includes(lower)) score += 3;
    return { ...item, score };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score);

  if (matched.length === 0) {
    results.innerHTML = '<div class="empty"><div class="gem">💎</div>找不到符合「' + q + '」的文章。<br/>試試其他關鍵字，或瀏覽 <a href="/blog/topics" style="color:#8a6e30">主題索引</a>。</div>';
    return;
  }

  results.innerHTML = matched.map(item => `
    <div class="result">
      <a href="${item.url}">
        <div class="result-meta">${item.cat}</div>
        <h3>${highlight(item.title, q)}</h3>
        <p>${highlight(item.kw.split(' ').slice(0, 8).join(' / '), q)}</p>
      </a>
    </div>
  `).join('');
  $('metaLine').innerHTML = '找到 <strong>' + matched.length + '</strong> 篇相關文章 / 共 <strong>' + INDEX.length + '</strong> 篇';
}

const inp = $('q');
inp.addEventListener('input', e => search(e.target.value));
$('clearBtn').addEventListener('click', () => { inp.value = ''; search(''); inp.focus(); });
document.querySelectorAll('.popular-tags button').forEach(btn => {
  btn.addEventListener('click', () => { inp.value = btn.dataset.q; search(btn.dataset.q); });
});

// URL ?q= support — direct search engine traffic
const urlQ = new URLSearchParams(location.search).get('q');
if (urlQ) { inp.value = urlQ; search(urlQ); }

// ---- Pagefind upgrade path ----

// Pagefind UI for full-text search across every page, hide the legacy results pane,

// remains active so the page still works.
(async function tryPagefind() {
  try {
    const probe = await fetch('/_pagefind/pagefind-ui.js', { method: 'HEAD' });
    if (!probe.ok) return;
    await new Promise((res, rej) => {
      const css = document.createElement('link');
      css.rel = 'stylesheet'; css.href = '/_pagefind/pagefind-ui.css';
      document.head.appendChild(css);
      const s = document.createElement('script');
      s.src = '/_pagefind/pagefind-ui.js';
      s.onload = res; s.onerror = rej;
      document.body.appendChild(s);
    });
    // Hide legacy results, swap to Pagefind UI bound to the same #q input
    document.getElementById('results').style.display = 'none';
    document.getElementById('metaLine').textContent = '已啟用全文搜尋(Pagefind 索引)';
    /* global PagefindUI */
    new PagefindUI({
      element: '#pagefind-mount',
      showImages: false,
      showSubResults: true,
      autofocus: false,
      processTerm: (t) => t,
      translations: {
        placeholder: '輸入關鍵字搜尋全文…',
        clear_search: '清除',
        load_more: '載入更多',
        search_label: '站內全文搜尋',
        filters_label: '篩選',
        zero_results: '找不到符合「[SEARCH_TERM]」的內容',
        many_results: '找到 [COUNT] 筆,顯示「[SEARCH_TERM]」',
        one_result: '找到 1 筆,顯示「[SEARCH_TERM]」',
        searching: '搜尋中…',
      },
    });
    // Hide our own search-box because Pagefind has its own
    document.querySelector('.search-box').style.display = 'none';
  } catch (e) { /* Pagefind not built yet — legacy search stays */ }
})();
</script>

</body>
</html>
