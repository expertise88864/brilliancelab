    border:1px dashed var(--border); border-radius:14px; background:#fff;

  .num-pair{ display:inline-flex; align-items:baseline; gap:2px; line-height:1; }

const _STARTER_VALUES = { table: 57.0, depth: 62.4, crown: 35.0, pavilion: 41.0 };

const state = {
  lang: (navigator.language || 'zh').toLowerCase().startsWith('zh') ? 'zh' : 'en',
  values: { ..._STARTER_VALUES },
  adv: { ...ADV_DEFAULTS },

};

/* ---------- i18n ---------- */
function applyLang() {
  document.documentElement.lang = state.lang === 'zh' ? 'zh-TW' : 'en';
  document.querySelectorAll('[data-zh]').forEach(el => {
    const txt = el.dataset[state.lang];
    if (txt != null) el.textContent = txt;
  });
  document.querySelectorAll('#langToggle button').forEach(b => {
    const active = b.dataset.lang === state.lang;
    b.classList.toggle('active', active);
    b.setAttribute('aria-pressed', active);
  });
  buildInputs();
  computeAndRender();
  renderCompare();
}

document.querySelectorAll('#langToggle button').forEach(b => {
  b.addEventListener('click', () => { state.lang = b.dataset.lang; applyLang(); });
});

/* ---------- Scoring ---------- */
function tierForParam(key, value) {
  const conf = SWEET_SPOTS[key];
  const dev = Math.abs(value - conf.spot);
  if (dev <= conf.tiers[0]) return { tier: 'ideal', dev };
  if (dev <= conf.tiers[1]) return { tier: 'good',  dev };
  return { tier: 'off', dev };
}

/* ---------- Server-side scoring proxy ----------
 * All scoring math lives in /api/score (Vercel Function).
 * Browser only sends 4 numbers and receives a result.
 * We debounce + cache to keep the UI responsive.            */

const _scoreCache = new Map();   // body-string -> result
let _scoreDebounceTimer = null;
let _scoreSeq = 0;

function _serializeForApi(values, adv) {
  return {
    table:        +values.table,
    depth:        +values.depth,
    crown:        +values.crown,
    pavilion:     +values.pavilion,
    starLength:   +(adv?.starLength  ?? 50),
    lowerGirdle:  +(adv?.lowerGirdle ?? 80),
    polish:       adv?.polish       ?? 'EX',
    symmetry:     adv?.symmetry     ?? 'EX',
    fluorescence: adv?.fluorescence ?? 'NONE'
  };
}

/* Last-known result, for synchronous consumers (CP value, save button, PDF). */
function _emptyResult(values) {
  const detail = {};
  for (const k of Object.keys(SWEET_SPOTS)) {
    detail[k] = { value: values[k], deviation: 0, tier: tierForParam(k, values[k]).tier };
  }
  return {
    score: 0,
    hca: { lightReturn: 0, fire: 0, scintillation: 0, spread: 0 },
    detail, totalDeduction: 0, harmony: 0, _pending: true
  };
}

async function fetchScore(values, adv) {
  const body = _serializeForApi(values, adv);
  const key = JSON.stringify(body);
  if (_scoreCache.has(key)) return _scoreCache.get(key);
  try {
    const resp = await fetch('/api/score', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
      cache: 'no-store'
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const data = await resp.json();
    _scoreCache.set(key, data);
    if (_scoreCache.size > 200) _scoreCache.delete(_scoreCache.keys().next().value);
    return data;
  } catch (err) {
    // Offline / API down — return a placeholder so the UI doesn't break.
    const placeholder = _emptyResult(values);
    placeholder._offline = true;
    placeholder._error = err.message || String(err);
    return placeholder;
  }
}

/* Synchronous evaluate() shim — returns the cached / last result so existing
 * call sites (saveBtn, PDF export, share) keep working unchanged.            */
function evaluate(values /*, adv*/) {
  const last = state.lastResult;
  if (last && !last._pending) return { score: last.score, detail: last.detail, hca: last.hca };
  return _emptyResult(values);
}

function overallTier(score) {
  if (score >= 97) return 'ideal';
  if (score >= 90) return 'excellent';
  if (score >= 80) return 'good';
  if (score >= 70) return 'fair';
  return 'off';
}

function chipForTier(tier) {
  return tier === 'ideal' ? 'ideal' : tier === 'good' ? 'good' : 'off';
}

/* ---------- UI: score panel (async, server-driven) ---------- */
function _showPending() {
  const scoreEl = document.getElementById('scoreValue');
  scoreEl.textContent = '…';
  const chip = document.getElementById('tierChip');
  if (chip) chip.style.opacity = '0.45';
}

async function computeAndRender() {
  // Mark UI as pending immediately so the user sees feedback while debounced
  _showPending();

  // Debounce: 220ms — long enough to coalesce slider drags, short enough to feel live
  const myToken = ++_scoreSeq;
  clearTimeout(_scoreDebounceTimer);
  await new Promise((resolve) => { _scoreDebounceTimer = setTimeout(resolve, 220); });
  if (myToken !== _scoreSeq) return;       // a newer call superseded us

  const result = await fetchScore(state.values, state.adv);
  if (myToken !== _scoreSeq) return;
  state.lastResult = result;

  const score = result.score || 0;
  const scoreEl = document.getElementById('scoreValue');
  const fromVal = parseFloat(scoreEl.textContent);
  animateNumber(scoreEl, isFinite(fromVal) ? fromVal : score, score, 500);
  document.querySelector('.score-ring').style.setProperty('--s', score);

  const tier = overallTier(score);
  const chip = document.getElementById('tierChip');
  chip.className = 'chip ' + (tier === 'ideal' || tier === 'excellent' ? 'ideal' : tier === 'good' ? 'good' : 'off');
  chip.style.opacity = '';
  chip.querySelector('span').textContent = TIER_OVERALL_LABEL[tier][state.lang];
  const t = TIER_TEXT[tier][state.lang];
  document.getElementById('tierTitle').textContent = t.name + (result._offline ? ' · ' + (state.lang==='zh'?'(離線)':'(offline)') : '');
  document.getElementById('tierDesc').textContent  = t.desc;

  // Per-axis meters
  const metersList = document.getElementById('metersList');
  metersList.innerHTML = '';
  Object.keys(SWEET_SPOTS).forEach(key => {
    const conf = SWEET_SPOTS[key];
    const d = result.detail[key];
    const lbl = LABELS[key];
    const tierColor = d.tier === 'ideal' ? '#c9a45c' : d.tier === 'good' ? '#5a86c5' : '#c75555';
    const range = conf.max - conf.min;
    const closeness = Math.max(0, 1 - d.deviation / (conf.tiers[1] * 2));

    const row = document.createElement('div');
    row.innerHTML = `
      <div class="flex items-baseline justify-between text-[12.5px]">
        <div class="text-ink-700">${state.lang==='zh'?lbl.zh:lbl.en}</div>
        <div class="text-ink-500 num">${d.value.toFixed(1)}${conf.unit} · Δ ${d.deviation.toFixed(2)}</div>
      </div>
      <div class="meter mt-2">
        <i style="width:${(closeness*100).toFixed(1)}%;background:linear-gradient(90deg,${tierColor}aa,${tierColor})"></i>
        <span class="marker" style="left:${((conf.spot - conf.min)/range*100).toFixed(2)}%"></span>
      </div>
    `;
    metersList.appendChild(row);
  });

  renderHCA(result.hca);
}

function fmtScore(v) {
  // Show "100" without decimals when at full score so the digits don't overflow the score ring
  if (v >= 99.995) return '100';
  return v.toFixed(2);
}

  fire:          { zh: '火彩 Fire',          en: 'Fire',          desc_zh: '由冠角主導 — 折射出的彩虹光譜強度',      desc_en: 'Crown-driven — rainbow flash intensity' },

function renderHCA(hca) {
  const grid = document.getElementById('hcaGrid');

  grid.innerHTML = '';
  Object.keys(HCA_LABELS).forEach(k => {
    const v = Math.max(0, Math.min(100, hca[k] ?? 0));

    `;
    grid.appendChild(cell);
  });

function animateNumber(el, from, to, dur) {
  const start = performance.now();
  function frame(now) {
    const p = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = from + (to - from) * eased;
    el.textContent = fmtScore(val);
    if (p < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function nameFor(i) {
  let s = '', n = i;
  do { s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26) - 1; } while (n >= 0);
  return s;
}

/* ---------- CP Value (price + carat) ---------- */
function cpValue() {
  const p = state.pricing.price, c = state.pricing.carat;
  if (!p || !c || p <= 0 || c <= 0) return null;
  const score = (state.lastResult && state.lastResult.score) || 0;
  if (!score) return null;
  // BPD = (S × √C) / (P / 10K)
  return (score * Math.sqrt(c)) / (p / 10000);
}
function cpGrade(cp) {
  if (cp == null) return null;
  if (cp >= 18) return { letter: 'S+', desc_zh: '極致 CP — 此規格在這個價位幾乎是行情頂端,強烈建議入手。', desc_en: 'Exceptional value — top of market for this spec at this price.' };
  if (cp >= 12) return { letter: 'S',  desc_zh: '極佳 CP — 在同等規格中價格非常具競爭力。',           desc_en: 'Outstanding value compared to peers.' };
  if (cp >= 9)  return { letter: 'A+', desc_zh: '優於市場平均,值得入手。',                            desc_en: 'Above-average value — worth considering.' };
  if (cp >= 6)  return { letter: 'A',  desc_zh: '合理區間,可再多比較幾顆。',                          desc_en: 'Reasonable value — compare more options.' };
  if (cp >= 4)  return { letter: 'B',  desc_zh: '價格略高於閃亮度應有水準,可嘗試議價。',              desc_en: 'Price runs slightly above the brilliance grade — worth negotiating.' };
  return                { letter: 'C', desc_zh: '價格偏貴,建議重新議價或尋找替代鑽石。',              desc_en: 'Pricey — consider negotiating or alternatives.' };
}
function updateCP() {
  const cp = cpValue();
  const result = document.getElementById('cpResult');
  const badge  = document.getElementById('cpBadge');
  if (cp == null) {
    result.classList.add('hidden');
    badge.style.display = 'none';
    return;
  }
  result.classList.remove('hidden');
  const g = cpGrade(cp);
  document.getElementById('cpValue').textContent = cp.toFixed(2);
  document.getElementById('cpGrade').textContent = g.letter;
  document.getElementById('cpHint').textContent  = state.lang==='zh' ? g.desc_zh : g.desc_en;
  badge.style.display = '';
  badge.className = 'chip ' + (cp >= 9 ? 'ideal' : cp >= 6 ? 'good' : 'off');
  badge.textContent = (state.lang==='zh' ? 'CP ' : 'Value ') + g.letter;
}

      const offText = offAxes.length ? `<strong>${offAxes.map(labelMap).join('、')}</strong>已偏離理想,` : '';
      const goodText = goodAxes.length ? `<strong>${goodAxes.map(labelMap).join('、')}</strong>接近但非頂級,` : '';
      summary = `這顆鑽石綜合 ${score.toFixed(2)} 分,${goodText}${offText}建議與其他候選鑽石一起加入比較,挑出價格相近但分數更高的選項。`;
    } else {
      const offText = offAxes.length ? `特別是 <strong>${offAxes.map(labelMap).join('、')}</strong>` : '';
      summary = `這顆鑽石綜合僅 ${score.toFixed(2)} 分,多項參數已偏離理想${offText ? '(' + offText + ')' : ''}。光學表現可能明顯不如同價位的更佳車工鑽石,建議重新議價或尋找替代品。`;
    }
  } else {
    if (tier === 'ideal' || tier === 'excellent') {
      summary = `This diamond scores ${score.toFixed(2)} / 100. ${offAxes.length===0&&goodAxes.length===0?'All four':'Nearly all'} parameters sit inside the industry sweet spot — exceptional optical performance can be expected.`;
    } else if (tier === 'good') {
      const offText = offAxes.length ? `<strong>${offAxes.map(labelMap).join(', ')}</strong> are off ideal; ` : '';
      const goodText = goodAxes.length ? `<strong>${goodAxes.map(labelMap).join(', ')}</strong> sit near (but not at) the top tier; ` : '';
      summary = `Score: ${score.toFixed(2)} / 100. ${goodText}${offText}we suggest comparing this stone alongside others to find a similarly-priced, higher-scoring alternative.`;
    } else {
      const offText = offAxes.length ? ` — especially <strong>${offAxes.map(labelMap).join(', ')}</strong>` : '';
      summary = `Score: ${score.toFixed(2)} / 100. Multiple parameters are off ideal${offText}. Optical performance will likely fall short of better-cut stones at the same price — consider negotiating or finding alternatives.`;
    }
  }
  const sumEl = document.getElementById('summaryText');
  if (sumEl) sumEl.innerHTML = summary;
}

const _origCompute = computeAndRender;
computeAndRender = async function() {
  await _origCompute();
  // After async result lands, redraw downstream views
  updateCP();
  renderBreakdown();
};

/* ---------- Share via URL (cloud-like save) ---------- */
function encodeShare() {
  const data = state.saved.map(d => ({ n: d.name, v: d.values }));
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}
function decodeShare(s) {
  return JSON.parse(decodeURIComponent(escape(atob(s))));
}

document.getElementById('shareBtn').addEventListener('click', async () => {
  if (!state.saved.length) {
    alert(state.lang==='zh'?'請先加入至少一顆鑽石到比較清單':'Add at least one diamond first.');
    return;
  }
  const url = `${location.origin}${location.pathname}#s=${encodeShare()}`;
  try {
    await navigator.clipboard.writeText(url);
    alert((state.lang==='zh'?'分享連結已複製到剪貼簿!\n\n':'Share link copied to clipboard!\n\n')+url);
  } catch {
    prompt(state.lang==='zh'?'複製這個連結分享你的比較結果:':'Copy this link to share your comparison:', url);
  }
});

async function loadFromHash() {
  const m = location.hash.match(/s=([A-Za-z0-9+/=]+)/);
  if (!m) return;
  try {
    const data = decodeShare(m[1]);
    // Score each saved diamond via API (in parallel)
    const results = await Promise.all(data.map(d => fetchScore(d.v, ADV_DEFAULTS)));
    state.saved = data.map((d, i) => ({
      id: Date.now() + i + Math.random(),
      name: d.n,
      values: d.v,
      score: results[i].score,
      detail: results[i].detail,
      hca: results[i].hca
    }));
    renderCompare();
  } catch (e) { console.warn('Failed to load shared state', e); }
}

/* ---------- Export PDF ---------- */
document.getElementById('pdfBtn').addEventListener('click', async () => {
  if (!state.saved.length) {
    alert(state.lang==='zh'?'請先加入至少一顆鑽石到比較清單':'Add at least one diamond first.');
    return;
  }
  if (!window.jspdf || !window.html2canvas) {
    alert(state.lang==='zh'?'PDF 模組載入中,請稍候 1-2 秒再試':'PDF library loading, please retry in a moment.');
    return;
  }
  const btn = document.getElementById('pdfBtn');
  const orig = btn.textContent;
  btn.textContent = state.lang==='zh'?'產生中…':'Generating…';
  btn.disabled = true;

  try {
    const target = document.getElementById('compareList');
    const canvas = await html2canvas(target, { backgroundColor: '#faf8f3', scale: 2, useCORS: true });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    const margin = 15;

    // Header
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18); doc.setTextColor(26, 29, 46);
    doc.text('BrillianceLab', margin, margin + 4);
    doc.setFontSize(10); doc.setFont('helvetica', 'normal'); doc.setTextColor(120);
    doc.text('Diamond Cut Comparison Report', margin, margin + 10);
    doc.text('Generated ' + new Date().toLocaleString(), pw - margin, margin + 10, { align: 'right' });
    doc.setDrawColor(201, 164, 92);
    doc.setLineWidth(0.4);
    doc.line(margin, margin + 13, pw - margin, margin + 13);

    // Image
    const imgW = pw - margin * 2;
    const imgH = (canvas.height / canvas.width) * imgW;
    const maxH = ph - margin * 2 - 25;
    let drawW = imgW, drawH = imgH;
    if (imgH > maxH) { drawH = maxH; drawW = (canvas.width / canvas.height) * drawH; }
    doc.addImage(imgData, 'PNG', (pw - drawW) / 2, margin + 18, drawW, drawH);

    // Footer
    doc.setFontSize(8); doc.setTextColor(150);
    doc.text('brilliancelab.vercel.app · Sweet-Spot scoring algorithm v2.0', margin, ph - 8);
    doc.text('For reference only — purchase decisions should rely on the official lab report.', margin, ph - 4);

    doc.save(`brilliancelab-${new Date().toISOString().slice(0,10)}.pdf`);
  } catch (e) {
    console.error(e);
    alert(state.lang==='zh'?'匯出 PDF 失敗,請重試':'PDF export failed, please retry.');
  } finally {
    btn.textContent = orig; btn.disabled = false;
  }
});

/* ---------- OCR (Tesseract.js, browser-side, free) ---------- */
let _ocrLib = null;
function loadTesseract() {
  if (_ocrLib) return _ocrLib;
  _ocrLib = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js';
    s.onload = () => resolve(window.Tesseract);
    s.onerror = () => reject(new Error('Tesseract.js load failed'));
    document.head.appendChild(s);
  });
  return _ocrLib;
}

function _setOcrStatus(msg, pct) {
  const wrap = document.getElementById('ocrStatus');
  wrap.classList.remove('hidden');
  document.getElementById('ocrStatusText').textContent = msg;
  if (pct != null) document.getElementById('ocrProgress').style.width = Math.max(0, Math.min(100, pct)) + '%';
}

function _parseOCR(text) {
  // Normalize: degrees, percent, common OCR confusions
  const T = text
    .replace(/[°˚]/g, '')
    .replace(/[Oo]/g, '0')        // O → 0 in numeric runs
    .replace(/[lI|]/g, '1')       // l/I/| → 1
    .replace(/,/g, '.')
    .replace(/\s+/g, ' ');

  // Be slightly fuzzy — allow stray words between key and number
  const grab = (re) => {
    const m = T.match(re);
    if (!m) return null;
    const v = parseFloat(m[1]);
    return isFinite(v) ? v : null;
  };

  // Pavilion angle is checked BEFORE crown so "Crown Angle" doesn't capture pavilion line by accident
  const out = {
    pavilion: grab(/Pavilion[^0-9]{0,12}([0-9]{2}\.[0-9])/i),
    crown:    grab(/Crown[^0-9]{0,12}([0-9]{2}\.[0-9])/i),
    table:    grab(/Table[^0-9]{0,8}([0-9]{2}(?:\.[0-9])?)\s*%?/i),
    depth:    grab(/(?:Total\s*)?Depth[^0-9]{0,8}([0-9]{2}\.[0-9])\s*%?/i),
  };
  return out;
}

function _clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

document.getElementById('ocrFile').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const lang = state.lang;
  const t = (zh, en) => lang === 'zh' ? zh : en;

  const resultBox = document.getElementById('ocrResult');
  resultBox.classList.add('hidden'); resultBox.innerHTML = '';

  try {
    _setOcrStatus(t('載入辨識引擎(首次需下載 ~10MB,之後就快了)…', 'Loading OCR engine (first run ~10MB, faster afterwards)…'), 5);
    const Tess = await loadTesseract();

    _setOcrStatus(t('開始辨識照片…', 'Recognizing image…'), 15);
    const { data } = await Tess.recognize(file, 'eng', {
      logger: (m) => {
        if (m.status === 'recognizing text') {
          _setOcrStatus(t('辨識中… ', 'Recognizing… ') + Math.round(m.progress * 100) + '%', 15 + m.progress * 80);
        }
      }
    });

    _setOcrStatus(t('解析鑑定書欄位…', 'Parsing fields…'), 96);
    const parsed = _parseOCR(data.text || '');

    let any = false;
    Object.keys(parsed).forEach((k) => {
      if (parsed[k] != null) {
        const c = SWEET_SPOTS[k];
        const v = _clamp(Math.round(parsed[k] * 10) / 10, c.min, c.max);
        state.values[k] = v;
        any = true;
      }
    });

    if (!any) {
      _setOcrStatus(t('辨識完成,但找不到 Table/Depth/Crown/Pavilion 數據。請拍清楚比例圖頁面後重試。',
                     'Done — but I couldn’t spot the four fields. Try a clearer photo of the proportions page.'), 100);
      return;
    }

    buildInputs(); computeAndRender();
    _setOcrStatus(t('完成!已自動帶入辨識結果(請對照鑑定書再確認):',
                   'Done! Numbers auto-filled (please double-check against the report):'), 100);

    resultBox.classList.remove('hidden');
    const labels = { table:'Table %', depth:'Depth %', crown:'Crown Angle', pavilion:'Pavilion Angle' };
    resultBox.innerHTML = Object.keys(labels).map(k => {
      const found = parsed[k] != null;
      return `<div class="p-3 rounded-xl border ${found?'border-gold-300 bg-[var(--gold-soft)]':'border-[var(--border)] bg-white'}">
        <div class="text-[10.5px] uppercase tracking-[.18em] ${found?'text-gold-700':'text-ink-500'} font-semibold">${labels[k]}</div>
        <div class="font-display text-[22px] mt-1 num ${found?'gold-text':'text-ink-400'}">${found?state.values[k].toFixed(1)+SWEET_SPOTS[k].unit:'—'}</div>
      </div>`;
    }).join('');

  } catch (err) {
    console.error(err);
    _setOcrStatus(t('辨識失敗:', 'OCR failed: ') + (err.message || err), 100);
  } finally {
    e.target.value = ''; // allow re-uploading same file
  }
});

/* ---------- Reveal on scroll ---------- */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

/* ---------- Init ---------- */
document.getElementById('yr').textContent = new Date().getFullYear();
applyLang();      // builds inputs + first computeAndRender (async, fires API)
loadFromHash();   // async — populates `state.saved` from a shared link if present
renderCompare();
</script>
