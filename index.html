<script>
/* ===========================================================
   BrillianceLab — diamond cut scoring (Sweet Spot v2.0)
   =========================================================== */

const SWEET_SPOTS = {
  table:    { spot: 55.5, multiplier: 8,  min: 50, max: 62, step: 0.1, unit: '%', tiers: [0.5, 1.5] },
  depth:    { spot: 61.7, multiplier: 10, min: 58, max: 66, step: 0.1, unit: '%', tiers: [0.3, 0.8] },
  crown:    { spot: 34.5, multiplier: 20, min: 30, max: 38, step: 0.1, unit: '°', tiers: [0.2, 0.5] },
  pavilion: { spot: 40.8, multiplier: 30, min: 38, max: 43, step: 0.1, unit: '°', tiers: [0.1, 0.2] }
};

const LABELS = {
  table:    { zh: '桌面 (Table)',          en: 'Table',          fire_zh: '影響範圍較小',            fire_en: 'Smaller optical footprint' },
  depth:    { zh: '深度 (Depth)',          en: 'Depth',          fire_zh: '決定整體比例',            fire_en: 'Defines overall proportion' },
  crown:    { zh: '冠部角度 (Crown)',       en: 'Crown angle',    fire_zh: '決定火彩 (Fire)',         fire_en: 'Drives Fire' },
  pavilion: { zh: '亭部角度 (Pavilion)',    en: 'Pavilion angle', fire_zh: '決定亮度 (Brilliance)',   fire_en: 'Drives Brilliance' }
};

const TIER_TEXT = {
  ideal:     { zh: { name:'完美的甜蜜點',  desc:'此車工高度集中於業界公認的最佳光學區間,可預期極致的火彩與亮度。' },
               en: { name:'Perfect sweet spot', desc:'This cut sits in the industry sweet spot — expect peak fire and brilliance.' } },
  excellent: { zh: { name:'極佳車工',  desc:'幾乎無偏離,高品質的視覺表現可被預期。' },
               en: { name:'Excellent cut', desc:'Negligible deviation — premium visual performance expected.' } },
  good:      { zh: { name:'良好車工',  desc:'在理想範圍內,但已可從頂級車工中區分出細微差距。' },
               en: { name:'Very good cut', desc:'Within the ideal envelope, with measurable distance from the top tier.' } },
  fair:      { zh: { name:'尚可',  desc:'已偏離理想值,光學表現可能受影響,建議進一步比較。' },
               en: { name:'Fair', desc:'Departing from ideal — optical performance may be compromised.' } },
  off:       { zh: { name:'偏離理想',  desc:'單項或多項參數明顯偏離,建議重新確認鑑定書。' },
               en: { name:'Below ideal', desc:'Clear deviation on one or more parameters — please verify the certificate.' } }
};

const TIER_LABEL = {
  ideal:{ zh:'頂級', en:'Ideal' },
  good: { zh:'理想', en:'Good' },
  off:  { zh:'偏離', en:'Off'  }
};

const TIER_OVERALL_LABEL = {
  ideal:    { zh:'頂級',     en:'Outstanding' },
  excellent:{ zh:'極佳',     en:'Excellent'   },
  good:     { zh:'良好',     en:'Very Good'   },
  fair:     { zh:'尚可',     en:'Fair'        },
  off:      { zh:'偏離',     en:'Below'       }
};

const state = {
  lang: (navigator.language || 'zh').toLowerCase().startsWith('zh') ? 'zh' : 'en',
  values: { table: 55.5, depth: 61.7, crown: 34.5, pavilion: 40.8 },
  saved: []
};

/* ---------- i18n ---------- */
function applyLang() {
  document.documentElement.lang = state.lang === 'zh' ? 'zh-TW' : 'en';
  document.querySelectorAll('[data-zh]').forEach(el => {
    const txt = el.dataset[state.lang];
    if (txt != null) el.textContent = txt;
  });
  document.querySelectorAll('#langToggle button').forEach(b => {
    const active = b.dataset.lang === state.lang;
    b.classList.toggle('active', active);
    b.setAttribute('aria-pressed', active);
  });
  buildInputs();
  computeAndRender();
  renderCompare();
}

document.querySelectorAll('#langToggle button').forEach(b => {
  b.addEventListener('click', () => { state.lang = b.dataset.lang; applyLang(); });
});

/* ---------- Scoring ---------- */
function tierForParam(key, value) {
  const conf = SWEET_SPOTS[key];
  const dev = Math.abs(value - conf.spot);
  if (dev <= conf.tiers[0]) return { tier: 'ideal', dev };
  if (dev <= conf.tiers[1]) return { tier: 'good',  dev };
  return { tier: 'off', dev };
}

function evaluate(values) {
  let score = 100;
  const detail = {};
  for (const k of Object.keys(SWEET_SPOTS)) {
    const conf = SWEET_SPOTS[k];
    const dev = Math.abs(values[k] - conf.spot);
    score -= dev * conf.multiplier;
    const t = tierForParam(k, values[k]);
    detail[k] = { value: values[k], deviation: dev, tier: t.tier };
  }
  return { score: Math.max(0, Math.round(score * 100) / 100), detail };
}

function overallTier(score) {
  if (score >= 97) return 'ideal';
  if (score >= 90) return 'excellent';
  if (score >= 80) return 'good';
  if (score >= 70) return 'fair';
  return 'off';
}

function chipForTier(tier) {
  return tier === 'ideal' ? 'ideal' : tier === 'good' ? 'good' : 'off';
}

/* ---------- UI: inputs ---------- */
function buildInputs() {
  const grid = document.getElementById('inputsGrid');
  grid.innerHTML = '';
  Object.keys(SWEET_SPOTS).forEach(key => {
    const conf = SWEET_SPOTS[key];
    const lbl = LABELS[key];
    const v = state.values[key];

    const card = document.createElement('div');
    card.className = 'card p-5 sm:p-6';
    card.innerHTML = `
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="text-[11px] uppercase tracking-[.22em] text-ink-500">${state.lang === 'zh' ? lbl.zh : lbl.en}</div>
          <div class="text-[11.5px] text-ink-500 mt-1.5 leading-snug">
            ${state.lang === 'zh' ? lbl.fire_zh : lbl.fire_en}
            <span class="text-ink-400"> · ${state.lang==='zh'?'理想':'Ideal'} ${conf.spot}${conf.unit}</span>
          </div>
        </div>
        <span class="chip ideal" data-chip>${state.lang==='zh'?'頂級':'Ideal'}</span>
      </div>

      <div class="mt-5 flex items-end justify-between gap-4">
        <div class="font-display gold-text font-semibold leading-none num" style="font-size:42px" data-val>
          <span data-num>${v.toFixed(1)}</span><span class="num text-[14px] text-ink-500 font-semibold ml-1">${conf.unit}</span>
        </div>
        <input type="number" min="${conf.min}" max="${conf.max}" step="${conf.step}" value="${v.toFixed(1)}" data-input
          class="input-num w-24 text-[14px]" />
      </div>

      <input type="range" min="${conf.min}" max="${conf.max}" step="${conf.step}" value="${v}" data-range class="range mt-5" />
      <div class="mt-2 flex justify-between text-[10.5px] uppercase tracking-[.18em] text-ink-500 num">
        <span>${conf.min}${conf.unit}</span><span>${conf.spot}${conf.unit}</span><span>${conf.max}${conf.unit}</span>
      </div>
    `;
    grid.appendChild(card);

    const range = card.querySelector('[data-range]');
    const input = card.querySelector('[data-input]');
    const numEl = card.querySelector('[data-num]');
    const chip  = card.querySelector('[data-chip]');

    const setProgress = (val) => {
      const pct = ((val - conf.min) / (conf.max - conf.min)) * 100;
      range.style.setProperty('--p', pct + '%');
    };
    setProgress(v);

    const onChange = (raw) => {
      let val = parseFloat(raw);
      if (isNaN(val)) return;
      val = Math.min(conf.max, Math.max(conf.min, Math.round(val * 10) / 10));
      state.values[key] = val;
      range.value = val; input.value = val.toFixed(1);
      numEl.textContent = val.toFixed(1);
      setProgress(val);
      const t = tierForParam(key, val).tier;
      chip.className = 'chip ' + chipForTier(t);
      chip.textContent = state.lang === 'zh' ? TIER_LABEL[t].zh : TIER_LABEL[t].en;
      computeAndRender();
    };

    range.addEventListener('input', e => onChange(e.target.value));
    input.addEventListener('change', e => onChange(e.target.value));
    input.addEventListener('blur',   e => onChange(e.target.value));
  });
}

/* ---------- UI: score panel ---------- */
function computeAndRender() {
  const result = evaluate(state.values);
  const score = result.score;

  const scoreEl = document.getElementById('scoreValue');
  animateNumber(scoreEl, parseFloat(scoreEl.textContent) || 0, score, 600);
  document.querySelector('.score-ring').style.setProperty('--s', score);

  const tier = overallTier(score);
  const chip = document.getElementById('tierChip');
  chip.className = 'chip ' + (tier === 'ideal' || tier === 'excellent' ? 'ideal' : tier === 'good' ? 'good' : 'off');
  chip.querySelector('span').textContent = TIER_OVERALL_LABEL[tier][state.lang];
  const t = TIER_TEXT[tier][state.lang];
  document.getElementById('tierTitle').textContent = t.name;
  document.getElementById('tierDesc').textContent  = t.desc;

  const metersList = document.getElementById('metersList');
  metersList.innerHTML = '';
  Object.keys(SWEET_SPOTS).forEach(key => {
    const conf = SWEET_SPOTS[key];
    const d = result.detail[key];
    const lbl = LABELS[key];
    const tierColor = d.tier === 'ideal' ? '#c9a45c' : d.tier === 'good' ? '#5a86c5' : '#c75555';
    const range = conf.max - conf.min;
    const closeness = Math.max(0, 1 - d.deviation / (conf.tiers[1] * 2));

    const row = document.createElement('div');
    row.innerHTML = `
      <div class="flex items-baseline justify-between text-[12.5px]">
        <div class="text-ink-700">${state.lang==='zh'?lbl.zh:lbl.en}</div>
        <div class="text-ink-500 num">${d.value.toFixed(1)}${conf.unit} · Δ ${d.deviation.toFixed(2)}</div>
      </div>
      <div class="meter mt-2">
        <i style="width:${(closeness*100).toFixed(1)}%;background:linear-gradient(90deg,${tierColor}aa,${tierColor})"></i>
        <span class="marker" style="left:${((conf.spot - conf.min)/range*100).toFixed(2)}%"></span>
      </div>
    `;
    metersList.appendChild(row);
  });
}

function animateNumber(el, from, to, dur) {
  const start = performance.now();
  function frame(now) {
    const p = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = from + (to - from) * eased;
    el.textContent = val.toFixed(2);
    if (p < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ---------- Comparison ---------- */
function nameFor(i) {
  let s = '', n = i;
  do { s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26) - 1; } while (n >= 0);
  return s;
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const r = evaluate({ ...state.values });
  state.saved.push({
    id: Date.now() + Math.random(),
    name: (state.lang === 'zh' ? '鑽石 ' : 'Diamond ') + nameFor(state.saved.length),
    values: { ...state.values },
    score: r.score,
    detail: r.detail
  });
  renderCompare();
  document.getElementById('compare').scrollIntoView({ behavior:'smooth', block:'start' });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (state.saved.length && confirm(state.lang==='zh'?'確定要清空全部比較項目嗎?':'Clear all compared diamonds?')) {
    state.saved = []; renderCompare();
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state.saved, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'brilliancelab-export.json';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state.values = { table: 55.5, depth: 61.7, crown: 34.5, pavilion: 40.8 };
  buildInputs(); computeAndRender();
});

function renderCompare() {
  const empty = document.getElementById('compareEmpty');
  const list = document.getElementById('compareList');
  if (!state.saved.length) {
    empty.classList.remove('hidden'); list.classList.add('hidden'); list.innerHTML = '';
    return;
  }
  empty.classList.add('hidden'); list.classList.remove('hidden');

  const sorted = [...state.saved].sort((a,b) => b.score - a.score);
  list.innerHTML = '';
  sorted.forEach((d, i) => {
    const isTop = i === 0 && sorted.length > 1;
    const card = document.createElement('div');
    card.className = 'card p-5 relative ' + (isTop ? 'ring-gold' : '');
    const tier = overallTier(d.score);
    const tierName = TIER_OVERALL_LABEL[tier][state.lang];

    card.innerHTML = `
      ${isTop ? `<div class="absolute -top-3 left-5 chip ideal" style="font-size:10.5px">${state.lang==='zh'?'★ 冠軍':'★ Winner'}</div>` : ''}
      <div class="flex items-start justify-between gap-3">
        <div>
          <div class="text-[10.5px] uppercase tracking-[.22em] text-ink-500 num">${state.lang==='zh'?'第':''}${i+1}${state.lang==='zh'?' 名':''}</div>
          <div class="font-display text-[22px] mt-1 ${isTop?'gold-text':'text-ink-900'}">${escapeHtml(d.name)}</div>
        </div>
        <button data-rm="${d.id}" class="text-ink-400 hover:text-ink-900 text-lg leading-none w-7 h-7 inline-flex items-center justify-center rounded-full hover:bg-gold-50" aria-label="remove">×</button>
      </div>

      <div class="mt-4 flex items-baseline gap-2">
        <span class="font-display text-[44px] gold-text leading-none num font-semibold">${d.score.toFixed(2)}</span>
        <span class="text-[10.5px] uppercase tracking-[.22em] text-ink-500">/ 100 · ${tierName}</span>
      </div>

      <div class="mt-5 grid grid-cols-2 gap-x-4 gap-y-2 text-[12.5px]">
        ${Object.keys(SWEET_SPOTS).map(k => {
          const lbl = LABELS[k]; const u = SWEET_SPOTS[k].unit; const t = d.detail[k].tier;
          const dot = t==='ideal'?'#c9a45c':t==='good'?'#5a86c5':'#c75555';
          return `<div class="flex items-center justify-between border-b border-[var(--line)] pb-1.5">
            <span class="flex items-center gap-2 text-ink-700">
              <span class="w-1.5 h-1.5 rounded-full" style="background:${dot}"></span>
              ${state.lang==='zh'?lbl.zh:lbl.en}
            </span>
            <span class="text-ink-900 num">${d.values[k].toFixed(1)}${u}</span>
          </div>`;
        }).join('')}
      </div>

      <div class="mt-4 text-[11px] text-ink-500 num">
        ${state.lang==='zh'?'與理想值總偏差':'Total deviation'} · Δ ${
          Object.keys(SWEET_SPOTS).reduce((s,k)=>s+d.detail[k].deviation,0).toFixed(2)
        }
      </div>
    `;
    list.appendChild(card);
  });

  list.querySelectorAll('[data-rm]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseFloat(btn.dataset.rm);
      state.saved = state.saved.filter(x => x.id !== id);
      renderCompare();
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Reveal on scroll ---------- */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

/* ---------- Init ---------- */
document.getElementById('yr').textContent = new Date().getFullYear();
applyLang();
</script>
</body>
</html>
