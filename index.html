<style>
  :root {
    --bg-0:#06060d; --bg-1:#0a0a14; --line:rgba(255,255,255,.08);
    --gold:#f5d27d; --gold-2:#c39e4d; --ice:#9ec3ff;
  }
  html,body{background:var(--bg-0);color:#e9eaf3}
  body{font-feature-settings:"ss01","cv11"}
  .gold-text{
    background:linear-gradient(180deg,#fff3d2 0%,#f5d27d 45%,#c39e4d 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .ice-text{
    background:linear-gradient(180deg,#ffffff 0%,#cfe0ff 50%,#6f9cff 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .glass{
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015));
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);
  }
  .hairline{border:1px solid var(--line)}
  .ring-gold{box-shadow:0 0 0 1px rgba(245,210,125,.45),0 0 60px -10px rgba(245,210,125,.45)}
  .orb{position:absolute;border-radius:9999px;filter:blur(90px);opacity:.55;pointer-events:none}
  .grain{
    background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:3px 3px;mix-blend-mode:overlay;opacity:.25;
  }
  .stars{
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.55), transparent 60%),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.4), transparent 60%),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,255,255,.45), transparent 60%),
      radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,.35), transparent 60%),
      radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,.35), transparent 60%);
  }
  .diamond-spin{animation:spin 22s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .float{animation:float 6s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .pulse-soft{animation:pulse-soft 4s ease-in-out infinite}
  @keyframes pulse-soft{0%,100%{filter:drop-shadow(0 0 12px rgba(245,210,125,.35))}50%{filter:drop-shadow(0 0 28px rgba(245,210,125,.7))}}
  .reveal{opacity:0;transform:translateY(14px);transition:all .8s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}

  /* slider */
  .range{
    -webkit-appearance:none;appearance:none;width:100%;height:4px;
    background:linear-gradient(to right,#f5d27d var(--p,50%),rgba(255,255,255,.08) var(--p,50%));
    border-radius:9999px;outline:none;cursor:pointer;
  }
  .range::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,#f5d27d 60%,#8a6e30 100%);
    border:1px solid rgba(255,255,255,.6);box-shadow:0 0 0 4px rgba(245,210,125,.12),0 6px 18px rgba(0,0,0,.4);
    cursor:pointer;transition:transform .15s ease;
  }
  .range::-webkit-slider-thumb:hover{transform:scale(1.12)}
  .range::-moz-range-thumb{
    width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,255,255,.6);
    background:radial-gradient(circle at 35% 30%,#fff,#f5d27d 60%,#8a6e30 100%);
  }

  /* number input cleanup */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield}

  /* meter (deviation bar) */
  .meter{position:relative;height:8px;border-radius:9999px;background:rgba(255,255,255,.06);overflow:hidden}
  .meter > i{position:absolute;inset:0;display:block;border-radius:inherit;transition:width .5s cubic-bezier(.2,.7,.2,1),background .3s}
  .marker{position:absolute;top:-3px;width:2px;height:14px;background:#f5d27d;border-radius:2px;box-shadow:0 0 8px rgba(245,210,125,.7)}

  /* tier chips */
  .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:9999px;font-size:11px;letter-spacing:.04em;font-weight:600;border:1px solid var(--line)}
  .chip.ideal{background:rgba(245,210,125,.12);color:#ffe6a8;border-color:rgba(245,210,125,.35)}
  .chip.good{background:rgba(158,195,255,.10);color:#cfe0ff;border-color:rgba(158,195,255,.30)}
  .chip.off{background:rgba(255,120,120,.10);color:#ffc6c6;border-color:rgba(255,120,120,.30)}

  /* score ring conic background */
  .score-ring{
    background:
      conic-gradient(from -90deg,
        #f5d27d calc(var(--s,0)*1%),
        rgba(255,255,255,.07) calc(var(--s,0)*1%) 100%);
  }

  /* table layout for compare on small screens -> cards */
  .scrollbar-thin::-webkit-scrollbar{height:8px;width:8px}
  .scrollbar-thin::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px}

  /* button */
  .btn-gold{
    background:linear-gradient(180deg,#ffe6a8 0%,#f5d27d 45%,#c39e4d 100%);color:#1b1500;
    border:1px solid rgba(255,235,180,.6);box-shadow:0 10px 24px -10px rgba(245,210,125,.6),inset 0 1px 0 rgba(255,255,255,.7);
  }
  .btn-gold:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn-ghost{border:1px solid var(--line);background:rgba(255,255,255,.02)}
  .btn-ghost:hover{background:rgba(255,255,255,.05)}

  /* lang toggle */
  .lang-toggle{display:inline-flex;border:1px solid var(--line);border-radius:9999px;overflow:hidden;background:rgba(255,255,255,.02)}
  .lang-toggle button{padding:6px 12px;font-size:12px;font-weight:600;color:#aab;letter-spacing:.04em}
  .lang-toggle button.active{background:linear-gradient(180deg,#ffe6a8,#c39e4d);color:#1b1500}

  /* ad slot */
  .ad-slot{
    border:1px dashed rgba(255,255,255,.12);border-radius:14px;
    background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.005));
    color:rgba(255,255,255,.35);font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;
  }

  /* subtle crown SVG outline glow */
  .icon-glow{filter:drop-shadow(0 6px 18px rgba(245,210,125,.35))}

  /* hide on narrow */
  @media (max-width: 640px){ .hide-sm{display:none} }
</style>

<!-- ======= How it works · 使用方式 ======= -->
<section id="how" class="relative pb-12 sm:pb-16">
  <div class="max-w-6xl mx-auto px-5 sm:px-8">
    <div class="text-center max-w-3xl mx-auto mb-10 reveal">
      <div class="text-[11px] uppercase tracking-[.22em] text-white/40 mb-3" data-zh="使用方式" data-en="How it works"></div>
      <h2 class="display-font text-3xl sm:text-4xl">
        <span class="gold-text" data-zh="只要四個數字,挑出最閃亮的鑽石" data-en="Four numbers. The most brilliant pick."></span>
      </h2>
      <p class="text-white/65 mt-5 text-[14.5px] sm:text-[15.5px] leading-relaxed"
         data-zh="不必是專家,也不必看懂整本鑑定書。請從 GIA / IGI / HRD 鑑定書上找到下方四項常見英文數據並輸入,我們會以業界公認的最佳光學「甜蜜點」演算法,客觀評估這顆鑽石的光學潛力,不受實驗室主觀車工等級 (Cut Grade) 影響。把多顆候選鑽石都輸入一次,系統會自動排名 — 在有限預算內,幫你挑出真正最閃亮、最值得入手的那顆八心八箭。"
         data-en="No expertise needed — and no need to read the whole report. Locate the four numbers below on a GIA / IGI / HRD certificate, type them in, and our Sweet-Spot algorithm will score the optical potential of the stone objectively, regardless of the lab's stated cut grade. Add multiple candidates and we'll rank them, so you can confidently pick the most sparkling Hearts &amp; Arrows diamond within your budget."></p>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="glass rounded-2xl p-5">
        <div class="flex items-center justify-between">
          <div class="text-[11px] uppercase tracking-[.22em] text-white/40">01</div>
          <span class="text-[10.5px] text-white/35 tracking-wider">Table %</span>
        </div>

        <p class="text-[12.5px] text-white/55 mt-2 leading-relaxed"

           data-en="The flat top facet, expressed as a % of the girdle diameter. Listed as “Table” on the report."></p>
      </div>
      <div class="glass rounded-2xl p-5">
        <div class="flex items-center justify-between">
          <div class="text-[11px] uppercase tracking-[.22em] text-white/40">02</div>
          <span class="text-[10.5px] text-white/35 tracking-wider">Depth %</span>

      <div class="glass rounded-2xl p-5">

          <span class="text-[10.5px] text-white/35 tracking-wider">Crown Angle</span>

        <p class="text-[12.5px] text-white/55 mt-2 leading-relaxed"

           data-en="The angle of the upper crown to the girdle — drives Fire. Listed as “Crown Angle”."></p>

      <div class="glass rounded-2xl p-5 ring-gold">
        <div class="flex items-center justify-between">

          <span class="text-[10.5px] text-gold-400/80 tracking-wider">Pavilion Angle</span>

        <div>
          <div class="text-sm font-semibold" data-zh="抄下四個數字" data-en="Copy four numbers"></div>
          <p class="text-[12.5px] text-white/55 mt-1 leading-relaxed"

             data-en="Flip to the “Proportions” diagram on the report and locate Table, Depth, Crown Angle, Pavilion Angle."></p>

<script>
/* =========================================================
   BrillianceLab — diamond cut scoring (Sweet Spot v2.0)
   ========================================================= */

const SWEET_SPOTS = {
  table:    { spot: 55.5, multiplier: 8,  min: 50, max: 62, step: 0.1, unit: '%', tiers: [0.5, 1.5] },
  depth:    { spot: 61.7, multiplier: 10, min: 58, max: 66, step: 0.1, unit: '%', tiers: [0.3, 0.8] },
  crown:    { spot: 34.5, multiplier: 20, min: 30, max: 38, step: 0.1, unit: '°', tiers: [0.2, 0.5] },
  pavilion: { spot: 40.8, multiplier: 30, min: 38, max: 43, step: 0.1, unit: '°', tiers: [0.1, 0.2] }
};

const LABELS = {
  table:    { zh: '桌面 (Table)',          en: 'Table %',          fire_zh: '影響範圍較小',          fire_en: 'Smaller optical footprint' },
  depth:    { zh: '深度 (Depth)',          en: 'Depth %',          fire_zh: '影響整體比例',          fire_en: 'Overall proportion' },
  crown:    { zh: '冠部角度 (Crown)',       en: 'Crown angle',      fire_zh: '決定火彩 (Fire)',       fire_en: 'Drives Fire' },
  pavilion: { zh: '亭部角度 (Pavilion)',    en: 'Pavilion angle',   fire_zh: '決定亮度 (Brilliance)', fire_en: 'Drives Brilliance' }
};

const TIER_TEXT = {
  ideal: {
    zh: { name: '完美的甜蜜點',  desc: '此車工高度集中於業界公認的最佳光學區間,可預期極致的火彩與亮度。' },
    en: { name: 'Perfect sweet spot', desc: "This cut sits in the industry sweet spot — expect peak fire and brilliance." }
  },
  excellent: {
    zh: { name: '極佳車工',  desc: '幾乎無偏離,高品質的視覺表現可被預期。' },
    en: { name: 'Excellent cut', desc: 'Negligible deviation — premium visual performance expected.' }
  },
  good: {
    zh: { name: '良好車工',  desc: '在理想範圍內,但已可從頂級車工中區分出細微差距。' },
    en: { name: 'Very good cut', desc: 'Within the ideal envelope, with measurable distance from the top tier.' }
  },
  fair: {
    zh: { name: '尚可',  desc: '已偏離理想值,光學表現可能受影響,建議進一步比較。' },
    en: { name: 'Fair', desc: 'Departing from ideal — optical performance may be compromised.' }
  },
  off: {
    zh: { name: '偏離理想',  desc: '單項或多項參數明顯偏離,建議重新確認鑑定書。' },
    en: { name: 'Below ideal', desc: 'Clear deviation on one or more parameters — please verify the certificate.' }
  }
};

const TIER_LABEL = {
  ideal:     { zh: '頂級',     en: 'Ideal'     },
  good:      { zh: '理想',     en: 'Good'      },
  off:       { zh: '偏離',     en: 'Off'       }
};

const state = {
  lang: (navigator.language || 'zh').toLowerCase().startsWith('zh') ? 'zh' : 'en',
  values: { table: 55.5, depth: 61.7, crown: 34.5, pavilion: 40.8 },
  saved: []
};

/* ---------- i18n ---------- */
function applyLang() {
  document.documentElement.lang = state.lang === 'zh' ? 'zh-TW' : 'en';
  document.querySelectorAll('[data-zh]').forEach(el => {
    const txt = el.dataset[state.lang];
    if (txt != null) el.textContent = txt;
  });
  document.querySelectorAll('#langToggle button').forEach(b => {
    const active = b.dataset.lang === state.lang;
    b.classList.toggle('active', active);
    b.setAttribute('aria-pressed', active);
  });
  // re-render parts that depend on lang
  buildInputs();
  computeAndRender();
  renderCompare();
}

document.querySelectorAll('#langToggle button').forEach(b => {
  b.addEventListener('click', () => { state.lang = b.dataset.lang; applyLang(); });
});

/* ---------- Scoring ---------- */
function tierForParam(key, value) {
  const conf = SWEET_SPOTS[key];
  const dev = Math.abs(value - conf.spot);
  if (dev <= conf.tiers[0]) return { tier: 'ideal', dev };
  if (dev <= conf.tiers[1]) return { tier: 'good',  dev };
  return { tier: 'off', dev };
}

function evaluate(values) {
  let score = 100;
  const detail = {};
  for (const k of Object.keys(SWEET_SPOTS)) {
    const conf = SWEET_SPOTS[k];
    const dev = Math.abs(values[k] - conf.spot);
    score -= dev * conf.multiplier;
    const t = tierForParam(k, values[k]);
    detail[k] = { value: values[k], deviation: dev, tier: t.tier };
  }
  return {
    score: Math.max(0, Math.round(score * 100) / 100),
    detail
  };
}

function overallTier(score) {
  if (score >= 97) return 'ideal';
  if (score >= 90) return 'excellent';
  if (score >= 80) return 'good';
  if (score >= 70) return 'fair';
  return 'off';
}

function chipForTier(tier) {
  return tier === 'ideal' ? 'ideal' : tier === 'good' ? 'good' : 'off';
}

/* ---------- UI: inputs ---------- */
function buildInputs() {
  const grid = document.getElementById('inputsGrid');
  grid.innerHTML = '';
  Object.keys(SWEET_SPOTS).forEach(key => {
    const conf = SWEET_SPOTS[key];
    const lbl = LABELS[key];
    const v = state.values[key];
    const card = document.createElement('div');
    card.className = 'glass rounded-2xl p-5 shadow-card';
    card.innerHTML = `
      <div class="flex items-start justify-between gap-3">
        <div>
          <div class="text-[11px] uppercase tracking-[.22em] text-white/40">${state.lang === 'zh' ? lbl.zh : lbl.en}</div>
          <div class="text-[11px] text-white/35 mt-1">${state.lang === 'zh' ? lbl.fire_zh : lbl.fire_en} · ${state.lang==='zh'?'理想':'Ideal'} ${conf.spot}${conf.unit}</div>
        </div>
        <span class="chip ideal" data-chip>${state.lang==='zh'?'頂級':'Ideal'}</span>
      </div>
      <div class="mt-4 flex items-end justify-between gap-3">
        <div class="display-font text-4xl gold-text leading-none" data-val>${v.toFixed(1)}<span class="text-lg text-white/45 ml-1">${conf.unit}</span></div>
        <input type="number" min="${conf.min}" max="${conf.max}" step="${conf.step}" value="${v}" data-input
          class="w-24 bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-right text-sm focus:outline-none focus:border-gold-400/60 transition" />
      </div>
      <input type="range" min="${conf.min}" max="${conf.max}" step="${conf.step}" value="${v}" data-range class="range mt-5" />
      <div class="mt-2 flex justify-between text-[10px] uppercase tracking-[.18em] text-white/30">
        <span>${conf.min}${conf.unit}</span><span>${conf.spot}${conf.unit}</span><span>${conf.max}${conf.unit}</span>
      </div>
    `;
    grid.appendChild(card);

    const range = card.querySelector('[data-range]');
    const input = card.querySelector('[data-input]');
    const valEl = card.querySelector('[data-val]');
    const chip  = card.querySelector('[data-chip]');

    const setProgress = (val) => {
      const pct = ((val - conf.min) / (conf.max - conf.min)) * 100;
      range.style.setProperty('--p', pct + '%');
    };
    setProgress(v);

    const onChange = (raw) => {
      let val = parseFloat(raw);
      if (isNaN(val)) return;
      val = Math.min(conf.max, Math.max(conf.min, Math.round(val * 10) / 10));
      state.values[key] = val;
      range.value = val; input.value = val;
      valEl.firstChild.nodeValue = val.toFixed(1);
      setProgress(val);
      const t = tierForParam(key, val).tier;
      chip.className = 'chip ' + chipForTier(t);
      chip.textContent = state.lang === 'zh' ? TIER_LABEL[t].zh : TIER_LABEL[t].en;
      computeAndRender();
    };

    range.addEventListener('input', e => onChange(e.target.value));
    input.addEventListener('change', e => onChange(e.target.value));
    input.addEventListener('blur', e => onChange(e.target.value));
  });
}

/* ---------- UI: score panel ---------- */
function computeAndRender() {
  const result = evaluate(state.values);
  const score = result.score;

  // big score
  const scoreEl = document.getElementById('scoreValue');
  animateNumber(scoreEl, parseFloat(scoreEl.textContent) || 0, score, 600);
  document.querySelector('.score-ring').style.setProperty('--s', score);

  // tier
  const tier = overallTier(score);
  const chip = document.getElementById('tierChip');
  chip.className = 'chip ' + (tier === 'ideal' || tier === 'excellent' ? 'ideal' : tier === 'good' ? 'good' : 'off');
  const t = TIER_TEXT[tier][state.lang];
  chip.querySelector('span').textContent = ({
    ideal:    state.lang==='zh'?'頂級':'Outstanding',
    excellent:state.lang==='zh'?'極佳':'Excellent',
    good:     state.lang==='zh'?'良好':'Very Good',
    fair:     state.lang==='zh'?'尚可':'Fair',
    off:      state.lang==='zh'?'偏離':'Below'
  })[tier];
  document.getElementById('tierTitle').textContent = t.name;
  document.getElementById('tierDesc').textContent  = t.desc;

  // meters
  const metersList = document.getElementById('metersList');
  metersList.innerHTML = '';
  Object.keys(SWEET_SPOTS).forEach(key => {
    const conf = SWEET_SPOTS[key];
    const d = result.detail[key];
    const row = document.createElement('div');
    const lbl = LABELS[key];
    const tierColor = d.tier === 'ideal' ? '#f5d27d' : d.tier === 'good' ? '#9ec3ff' : '#ff8a8a';
    const range = conf.max - conf.min;
    const pos = ((d.value - conf.min) / range) * 100;
    // bar fills proportional to "closeness" to spot
    const closeness = Math.max(0, 1 - d.deviation / (conf.tiers[1] * 2));
    row.innerHTML = `
      <div class="flex items-center justify-between text-[12px]">
        <div class="text-white/65">${state.lang==='zh'?lbl.zh:lbl.en}</div>
        <div class="text-white/45">${d.value.toFixed(1)}${conf.unit} · Δ ${d.deviation.toFixed(2)}</div>
      </div>
      <div class="meter mt-2">
        <i style="width:${(closeness*100).toFixed(1)}%;background:linear-gradient(90deg,${tierColor}88,${tierColor})"></i>
        <span class="marker" style="left:${((conf.spot - conf.min)/range*100).toFixed(2)}%"></span>
      </div>
    `;
    metersList.appendChild(row);
  });
}

function animateNumber(el, from, to, dur) {
  const start = performance.now();
  function frame(now) {
    const p = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = from + (to - from) * eased;
    el.textContent = val.toFixed(2);
    if (p < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ---------- Comparison ---------- */
function nameFor(i) {
  // A, B, ..., Z, AA, AB ...
  let s = '', n = i;
  do { s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26) - 1; } while (n >= 0);
  return s;
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const r = evaluate({ ...state.values });
  state.saved.push({
    id: Date.now() + Math.random(),
    name: (state.lang === 'zh' ? '鑽石' : 'Diamond ') + nameFor(state.saved.length),
    values: { ...state.values },
    score: r.score,
    detail: r.detail
  });
  renderCompare();
  document.getElementById('compare').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (state.saved.length && confirm(state.lang==='zh'?'確定要清空全部比較項目嗎?':'Clear all compared diamonds?')) {
    state.saved = []; renderCompare();
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state.saved, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'brilliancelab-export.json';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state.values = { table: 55.5, depth: 61.7, crown: 34.5, pavilion: 40.8 };
  buildInputs(); computeAndRender();
});

function renderCompare() {
  const empty = document.getElementById('compareEmpty');
  const list = document.getElementById('compareList');
  if (!state.saved.length) {
    empty.classList.remove('hidden'); list.classList.add('hidden'); list.innerHTML = '';
    return;
  }
  empty.classList.add('hidden'); list.classList.remove('hidden');
  const sorted = [...state.saved].sort((a,b) => b.score - a.score);
  list.innerHTML = '';
  sorted.forEach((d, i) => {
    const isTop = i === 0 && sorted.length > 1;
    const card = document.createElement('div');
    card.className = 'glass rounded-2xl p-5 relative ' + (isTop ? 'ring-gold' : '');
    const tier = overallTier(d.score);
    const tierName = ({
      ideal:    state.lang==='zh'?'頂級':'Outstanding',
      excellent:state.lang==='zh'?'極佳':'Excellent',
      good:     state.lang==='zh'?'良好':'Very Good',
      fair:     state.lang==='zh'?'尚可':'Fair',
      off:      state.lang==='zh'?'偏離':'Below'
    })[tier];
    card.innerHTML = `
      ${isTop ? `<div class="absolute -top-3 left-5 chip ideal" style="font-size:10.5px">${state.lang==='zh'?'★ 冠軍':'★ Winner'}</div>` : ''}
      <div class="flex items-start justify-between gap-3">
        <div>
          <div class="text-[10px] uppercase tracking-[.22em] text-white/40">${state.lang==='zh'?'第':''}${i+1}${state.lang==='zh'?' 名':''}</div>
          <div class="display-font text-2xl mt-1 ${isTop?'gold-text':'text-white/85'}">${escapeHtml(d.name)}</div>
        </div>
        <button data-rm="${d.id}" class="text-white/35 hover:text-white/80 text-lg leading-none" aria-label="remove">×</button>
      </div>
      <div class="mt-4 flex items-baseline gap-2">
        <span class="display-font text-5xl gold-text leading-none">${d.score.toFixed(2)}</span>
        <span class="text-xs uppercase tracking-[.18em] text-white/45">/ 100 · ${tierName}</span>
      </div>
      <div class="mt-5 grid grid-cols-2 gap-x-4 gap-y-2 text-[12.5px]">
        ${Object.keys(SWEET_SPOTS).map(k => {
          const lbl = LABELS[k]; const u = SWEET_SPOTS[k].unit; const t = d.detail[k].tier;
          const dot = t==='ideal'?'#f5d27d':t==='good'?'#9ec3ff':'#ff8a8a';
          return `<div class="flex items-center justify-between border-b border-white/5 pb-1.5">
            <span class="flex items-center gap-2 text-white/55">
              <span class="w-1.5 h-1.5 rounded-full" style="background:${dot}"></span>
              ${state.lang==='zh'?lbl.zh:lbl.en}
            </span>
            <span class="text-white/85 tabular-nums">${d.values[k].toFixed(1)}${u}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="mt-4 text-[11px] text-white/40">
        ${state.lang==='zh'?'與理想值總偏差':'Total deviation'} · Δ ${
          Object.keys(SWEET_SPOTS).reduce((s,k)=>s+d.detail[k].deviation,0).toFixed(2)
        }
      </div>
    `;
    list.appendChild(card);
  });
  list.querySelectorAll('[data-rm]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseFloat(btn.dataset.rm);
      state.saved = state.saved.filter(x => x.id !== id);
      renderCompare();
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Reveal on scroll ---------- */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

/* ---------- Init ---------- */
document.getElementById('yr').textContent = new Date().getFullYear();
applyLang();
</script>
</body>
</html>
